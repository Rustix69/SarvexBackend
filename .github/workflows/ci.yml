name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  milestone0-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Make build
        run: make build

      - name: Make test
        run: make test
