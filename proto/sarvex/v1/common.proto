syntax = "proto3";

package sarvex.v1;

option go_package = "github.com/sarvex/proto/gen/go/sarvex/v1;sarvexv1";

enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_YES = 1;
  SIDE_NO = 2;
  SIDE_LONG = 3;
  SIDE_SHORT = 4;
}

enum Action {
  ACTION_UNSPECIFIED = 0;
  ACTION_BUY = 1;
  ACTION_SELL = 2;
}

enum TimeInForce {
  TIME_IN_FORCE_UNSPECIFIED = 0;
  TIME_IN_FORCE_GTC = 1;
  TIME_IN_FORCE_IOC = 2;
  TIME_IN_FORCE_FOK = 3;
}

enum SelfTradePreventionType {
  SELF_TRADE_PREVENTION_TYPE_UNSPECIFIED = 0;
  SELF_TRADE_PREVENTION_TYPE_TAKER_AT_CROSS = 1;
  SELF_TRADE_PREVENTION_TYPE_MAKER = 2;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING = 1;
  ORDER_STATUS_OPEN = 2;
  ORDER_STATUS_PARTIAL = 3;
  ORDER_STATUS_FILLED = 4;
  ORDER_STATUS_CANCELLED = 5;
  ORDER_STATUS_REJECTED = 6;
  ORDER_STATUS_EXPIRED = 7;
}

enum ContractKind {
  CONTRACT_KIND_UNSPECIFIED = 0;
  CONTRACT_KIND_BINARY = 1;
  CONTRACT_KIND_SCALAR = 2;
}

enum ContractState {
  CONTRACT_STATE_UNSPECIFIED = 0;
  CONTRACT_STATE_DRAFT = 1;
  CONTRACT_STATE_LISTED = 2;
  CONTRACT_STATE_OPEN = 3;
  CONTRACT_STATE_CLOSED = 4;
  CONTRACT_STATE_RESOLVING = 5;
  CONTRACT_STATE_SETTLED = 6;
  CONTRACT_STATE_CANCELLED = 7;
  CONTRACT_STATE_HALTED = 8;
}
