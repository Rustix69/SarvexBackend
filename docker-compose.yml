name: sarvex

services:
  postgres:
    image: postgres:16
    container_name: sarvex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nats:
    image: nats:2.10-alpine
    container_name: sarvex-nats
    restart: unless-stopped
    command:
      - "-js=false"
      - "--http_port=${NATS_MONITOR_PORT}"
    ports:
      - "${NATS_PORT}:4222"
      - "${NATS_MONITOR_PORT}:${NATS_MONITOR_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${NATS_MONITOR_PORT}/healthz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: sarvex-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
